#:schema ../../schemas/json/scarb.json
[package]
name = "my_package"
version = "0.1.0"
edition = "2024_07"
description = "An example Scarb package"
license = "MIT"

[dependencies]
starknet = "2.9.1"
openzeppelin = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v0.9.0" }

[dev-dependencies]
snforge_std = { path = "../snforge_std" }

[lib]
sierra = true
casm = true

[cairo]
sierra-replace-ids = true
allow-warnings = false

[scripts]
test = "snforge test"

[tool.snforge]
exit_first = true

[features]
enable_feature_a = []
