# yaml-language-server: $schema=../../schemas/json/vhwdebugger-binding-schema.json
version: '1.2'

default-debugger: DefaultValues

debuggers:
  DefaultValues:
    type: lauterbach
    node: localhost
    port: 30000

  iSYSTEM:
    type: isystem
    reset: true
    run: true
    node: localhost
    port: 5315
    isystem:
      disable-winidea-polling: true

  TASKING:
    type: tasking
    reset: true
    run: true
    node: localhost
    port: 5315
    tasking:
      disable-winidea-polling: true

  Lauterbach:
    type: lauterbach
    reset: false
    run: true
    node: localhost
    port: 30000
    auto-connect: true
    lauterbach:
      pack-len: 123

  GDB:
    type: gdb
    node: localhost
    port: 1234
    run: true
    auto-connect: false
    gdb:
      path-to-gdb-client: 'dummy/gdb.exe'
      path-to-symbol-file: 'dummy/app.elf'

  SEGGER-IP:
    type: segger-jlink
    node: localhost
    port: 1234
    run: true
    auto-connect: false
    segger-jlink:
      path-to-symbol-file: 'dummy/app.elf'
      device: RP2040_M0_0
      target-interface: SWD
      speed: 4000
      jlink-dll-path: 'dummy/jlink.dll'
      jlink-commands:
        - 'command number one'
        - 'the second command'

  SEGGER-USB:
    type: segger-jlink
    run: true
    auto-connect: false
    segger-jlink:
      serial-number: '852012345'
      path-to-symbol-file: 'dummy/app.elf'
      device: RP2040_M0_0
      target-interface: SWD
      speed: 4000
      jlink-dll-path: 'dummy/jlink.dll'
      jlink-commands:
        - 'command number one'
        - 'the second command'

  SEGGER-USB-2:
    type: segger-jlink
    run: true
    auto-connect: false
    segger-jlink:
      serial-number: 852012345
      path-to-symbol-file: 'dummy/app.elf'
      device: RP2040_M0_0
      target-interface: SWD
      speed: 4000
      jlink-dll-path: 'dummy/jlink.dll'
      jlink-commands:
        - 'command number one'
        - 'the second command'
