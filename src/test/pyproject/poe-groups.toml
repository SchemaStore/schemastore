#:schema ../../schemas/json/pyproject.json

[tool.poe.groups.server]
heading = "Application Serving"
executor = { type = "uv", group = "server" }

[tool.poe.groups.server.tasks.dev]
help = "Run the app in debug mode"
cmd = "uvicorn my_app:app --reload"

[tool.poe.groups.server.tasks.prod]
help = "Run the app in production mode"
cmd = "uvicorn my_app:app"

[tool.poe.groups.testing]
heading = "Testing Tasks"

[tool.poe.groups.testing.tasks.unit]
cmd = "pytest tests/unit"
help = "Run unit tests"

[tool.poe.groups.testing.tasks.integration]
cmd = "pytest tests/integration"
help = "Run integration tests"

[tool.poe.groups.testing.tasks.all]
sequence = ["unit", "integration"]
help = "Run all tests"

[tool.poe.groups.no-heading]

[tool.poe.groups.no-heading.tasks.build]
cmd = "python -m build"
