#:schema ../../schemas/json/pyproject.json
[tool.docstring-format-checker]
allow_undefined_sections = false
require_docstrings = true
check_private = true
validate_param_types = true
optional_style = "strict"

[[tool.docstring-format-checker.sections]]
name = "Parameters"
type = "list_name_and_type"
order = 1
required = true
admonition = false

[[tool.docstring-format-checker.sections]]
name = "Returns"
type = "list_type"
order = 2
required = true
admonition = "info"
prefix = "Returns:"
message = "Return type documentation is required"

[[tool.docstring-format-checker.sections]]
name = "Raises"
type = "list_name"
order = 3
required = false

[[tool.docstring-format-checker.sections]]
name = "Yields"
type = "list_type"
order = 4
required = false

[[tool.docstring-format-checker.sections]]
name = "Note"
type = "free_text"
admonition = "note"
required = false
