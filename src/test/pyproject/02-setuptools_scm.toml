#:schema ../../schemas/json/pyproject.json
[tool.setuptools_scm]
root = "src"
version_scheme = "guess-next-dev"
local_scheme = "node-and-date"
version_file = "pkg/_version.py"
version_file_template = "{version}"
relative_to = "tools/version.py"
tag_regex = '^release-(?P<version>.+)$'
parentdir_prefix_version = "mypackage-"
fallback_version = "1.2.3"
fallback_root = "dist"
normalize = false
version_cls = "mypackage.version:Version"

[tool.setuptools_scm.scm.git]
describe_command = [
  "git",
  "describe",
  "--dirty",
  "--tags",
  "--long",
  "--match",
  "release-*",
]
pre_parse = "fail_on_shallow"
