#:schema ../../schemas/json/pyproject.json
[tool.dfc]
allow_undefined_sections = true
require_docstrings = true
check_private = false
validate_param_types = true
optional_style = "validate"

[[tool.dfc.sections]]
name = "Args"
type = "list_name_and_type"
order = 1
admonition = false
required = true

[[tool.dfc.sections]]
name = "Returns"
type = "list_type"
order = 2
admonition = "note"
prefix = "Return value:"
required = false
message = "Missing returns section"

[[tool.dfc.sections]]
name = "Raises"
type = "list_name"
order = 3
required = false

[[tool.dfc.sections]]
name = "Examples"
type = "free_text"
order = 4
admonition = "example"
required = false
