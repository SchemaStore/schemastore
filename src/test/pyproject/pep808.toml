#:schema ../../schemas/json/pyproject.json
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pep808-example"
description = "An example PEP 808 package"
dynamic = [
  "version",
  "dependencies",
  "optional-dependencies",
  "classifiers",
  "authors",
  "maintainers",
  "keywords",
  "license-files",
  "urls",
  "scripts",
  "gui-scripts",
  "entry-points",
  "import-names",
  "import-namespaces",
]
dependencies = ["torch", "packaging"]
keywords = ["example", "pep808"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python :: 3",
]
license-files = ["LICENSE"]
import-names = ["example_package"]
import-namespaces = ["example_namespace"]

[project.optional-dependencies]
test = ["pytest"]

[[project.authors]]
name = "Example Author"
email = "author@example.com"

[project.urls]
Homepage = "https://example.com"

[project.scripts]
cli = "package.module:main"

[project.gui-scripts]
gui = "package.module:gui_main"

[project.entry-points."pygments.styles"]
monokai = "package.module:monokai"

[[project.maintainers]]
name = "Maintainer"
email = "maintainer@example.com"
