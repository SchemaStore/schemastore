#:schema ../../schemas/json/pyproject.json
[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "extension-project"
version = "0.1.0"

[tool.setuptools]
ext-modules = [
  { name = "extension_project.foo", sources = [
    "src/extension_project/foo.c",
  ], include-dirs = [
    "include",
  ], define-macros = [
    [
      "FOO",
      "1",
    ],
    [
      "BAR",
      "",
    ],
  ], undef-macros = [
    "BAZ",
  ], library-dirs = [
    "lib",
  ], libraries = [
    "foo",
  ], runtime-library-dirs = [
    "runtime-lib",
  ], extra-objects = [
    "build/helper.o",
  ], extra-compile-args = [
    "-Wall",
  ], extra-link-args = [
    "-Wl,--as-needed",
  ], export-symbols = [
    "PyInit_foo",
  ], swig-opts = [
    "-modern",
  ], depends = [
    "src/extension_project/foo.h",
  ], language = "c", optional = true, py-limited-api = true },
]
