# yaml-language-server: $schema=../../schemas/json/bosh-bpm-config.json
# From: https://github.com/cloudfoundry/bpm-release/blob/9d556975335b6fbfe4c8e5a729ac02d1faba542b/docs/config.md#example
processes:
  - name: server
    executable: /var/vcap/data/packages/server/serve.sh
    args:
      - --port
      - 2424

    env:
      FOO: BAR

    limits:
      processes: 10

    ephemeral_disk: true

    additional_volumes:
      - path: /var/vcap/data/sockets
        writable: true

    capabilities:
      - NET_BIND_SERVICE

  - name: worker
    executable: /var/vcap/data/packages/worker/work.sh
    args:
      - --queues
      - 4

    additional_volumes:
      - path: /var/vcap/data/sockets
        writable: true

    hooks:
      pre_start: /var/vcap/jobs/server/bin/worker-setup
