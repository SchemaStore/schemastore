# yaml-language-server: $schema=../../schemas/json/hugo.json

# 1. permalinks array form (new in 0.161.0)
permalinks:
  - pattern: /artikel/
    target:
      path: '{/articles}'
      sites:
        matrix:
          languages:
            - de
  - pattern: /artikel/:year/:month/:slug/
    target:
      path: '{/articles/**}'
      sites:
        matrix:
          languages:
            - de

# 2. module.mounts files/sites (new in 0.153.0)
module:
  mounts:
    - source: content
      target: content
      files:
        - '! docs/*'
    - source: assets
      target: assets
      sites:
        matrix:
          languages:
            - en
