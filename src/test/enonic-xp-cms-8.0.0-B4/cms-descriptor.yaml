# yaml-language-server: $schema=../../schemas/json/enonic-xp-cms-8.0.0-B4.json
kind: 'CMS'
config:
  property_1: 'value_1'
  property_2: 'value_2'

mixins:
  - name: 'all-except-folders'
    allowContentTypes: '^(?!base:folder$).*'
    optional: true
  - name: 'folders-only'
    allowContentTypes: 'base:folder'
    optional: false

form:
  - type: 'RadioButton'
    name: 'backgroundColor'
    label: 'Page background'
    options:
      - value: 'white'
        label: 'White'
      - value: 'grey'
        label: 'Grey'
    default: 'white'
