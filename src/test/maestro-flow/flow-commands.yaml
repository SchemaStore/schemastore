# yaml-language-server: $schema=../../schemas/json/maestro-flow.json
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: sign_in
    timeout: 30000
- tapOn:
    id: sign_in
- inputText: user@example.test
- hideKeyboard
- assertVisible: Home
- runFlow:
    label: dismiss onboarding
    when:
      visible: Skip
    commands:
      - tapOn: Skip
