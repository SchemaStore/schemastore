# yaml-language-server: $schema=../../schemas/json/enonic-xp-site-8.0.0-B4.json
kind: "Site"
mappings:
  - filter: "myapp:myfilter"
    pattern: "/path/*"
  - controller: "myapp:mycontroller"
    pattern: "/path/*"
  - service: "myapp:myservice"
    filter: "myapp:myfilter"
processors:
  - name: "myapp:myprocessor"
    order: 10
apis:
  - "myapi"
config:
  p1: 1
