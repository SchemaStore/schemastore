#:schema ../../schemas/json/quikrun.json
# quikrun.toml test file
shell = "bash"
clear_terminal = false
show_time_took = true
show_command = true
show_shell = false
show_divider = true
temp_dir = "/tmp/quikrun"
cd_to_file_dir = true
keep_artifacts = false

[commands]
py = "python {file}"
go = { command = "go run {file}", temp_file = true }
cpp = { command = "./{bin}", compile = "g++ {file} -o {bin}" }
