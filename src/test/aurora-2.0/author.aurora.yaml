# yaml-language-server: $schema=../../schemas/json/aurora-2.0.json
version: 0.0.1
boundedContextName: library
moduleName: author
moduleNames: authors
aggregateName: LibraryAuthor
hasOAuth: true
hasTenant: false
hasAuditing: false
description: Authors that belong to the library bounded context
front:
  gender: masculine
  iconModule: '@ng-icons/lucide'
  outlineIcon: lucideUser
  embedSupport: true
  displayField: name
aggregateProperties:
  - name: id
    type: id
    primaryKey: true
    nullable: false
  - name: rowId
    type: bigint
    index: unique
    autoIncrement: true
    nullable: false
  - name: name
    type: varchar
    maxLength: 50
    nullable: false
    widget:
      type: select
      listSort: 1
      detailSort: 1
  - name: books
    type: relationship
    nullable: true
    relationship:
      type: one-to-many
      singularName: book
      aggregateName: LibraryBook
      modulePath: library/book
    widget:
      type: grid-elements-manager
  - name: createdAt
    type: timestamp
    nullable: true
  - name: updatedAt
    type: timestamp
    nullable: true
  - name: deletedAt
    type: timestamp
    nullable: true
additionalApis: []
