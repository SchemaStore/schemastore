# yaml-language-server: $schema=../../schemas/json/aurora-2.0.json
version: 0.0.1
boundedContextName: library
moduleName: book
moduleNames: books
aggregateName: LibraryBook
hasOAuth: true
hasTenant: false
hasAuditing: false
front:
  gender: masculine
  iconModule: '@ng-icons/lucide'
  outlineIcon: lucideBook
  detailMode: dialog
  displayField: '{title}'
aggregateProperties:
  - name: id
    type: id
    primaryKey: true
    nullable: false
  - name: rowId
    type: bigint
    index: unique
    autoIncrement: true
    nullable: false
  - name: title
    description: The title of the book
    type: varchar
    maxLength: 50
    nullable: false
    isI18n: true
    widget:
      type: select
      span: 6
      tab: general
      group: main
  - name: publishedAt
    type: date
    nullable: false
    applyTimezone: false
  - name: price
    type: int
    maxLength: 10
    nullable: false
    unsigned: true
  - name: tags
    type: array
    nullable: true
    arrayOptions:
      type: varchar
      maxLength: 32
  - name: authorId
    type: id
    nullable: false
    relationship:
      type: many-to-one
      aggregateName: LibraryAuthor
      modulePath: library/author
      key: id
      field: author
      avoidConstraint: true
    widget:
      type: async-search-select
  - name: authorName
    type: varchar
    maxLength: 50
    nullable: false
    readonly: true
  - name: createdAt
    type: timestamp
    nullable: true
  - name: updatedAt
    type: timestamp
    nullable: true
  - name: deletedAt
    type: timestamp
    nullable: true
excludedOperations:
  - delete
  - deleteById
