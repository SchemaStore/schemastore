# yaml-language-server: $schema=../../schemas/json/enonic-xp-style-8.0.0-B4.json
kind: 'Style'
styles:
  - name: 'sepia-shake'
    type: 'Image'
    label: 'Sepia wide screen'
    editor:
      css: |
        /* Target the figure block itself */
        .sepia-shake {
            display: inline-block;
            filter: sepia(100%);
            animation: shake-anim 0.5s infinite;
        }

        /* Target the image inside the block automatically */
        .sepia-shake img {
            display: block;
            width: 100px;
            height: 100px;
        }

        @keyframes shake-anim {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
