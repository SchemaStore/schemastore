# yaml-language-server: $schema=../../schemas/json/starlake.json
version: 1
task:
  name: overwrite_by_partition_task
  domain: warehouse
  table: partitioned_data
  writeStrategy:
    type: OVERWRITE_BY_PARTITION
    key:
      - partition_date
    timestamp: event_time
    on: TARGET
    queryFilter: 'partition_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY)'
    startTs: valid_from
    endTs: valid_to
    types:
      bigquery: UPSERT_BY_KEY
      snowflake: SCD2
      duckdb: DELETE_THEN_INSERT
