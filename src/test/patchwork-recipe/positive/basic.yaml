# yaml-language-server: $schema=https://raw.githubusercontent.com/patchworkos/recipes/main/schema/recipe.v1.json
name: jira-to-linear-sync
description: Sync open Jira issues to Linear
trigger:
  type: manual
steps:
  - id: fetch
    tool: jira.searchIssues
    params:
      jql: "status = Open"
  - id: create
    tool: linear.createIssue
    params:
      title: "{{steps.fetch.data.issues[0].summary}}"
    awaits: [fetch]
    risk: medium
